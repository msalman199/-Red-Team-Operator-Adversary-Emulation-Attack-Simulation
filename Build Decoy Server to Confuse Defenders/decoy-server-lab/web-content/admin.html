<!DOCTYPE html>
<html>
<head>
    <title>TechCorp Admin Portal</title>
    <style>
        body { background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; color: #333; padding: 40px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Administrator Access</h2>
        <form action="/admin-auth" method="post">
            <input type="text" placeholder="Admin Username" name="admin_user" required>
            <input type="password" placeholder="Admin Password" name="admin_pass" required>
            <button type="submit">Access System</button>
        </form>
        <p style="font-size: 12px; color: #666;">Authorized personnel only. All access attempts are logged.</p>
    </div>
</body>
</html>
